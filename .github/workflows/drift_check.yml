name: Drift Check

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Every Monday 6am UTC

jobs:
  drift-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install polars pandas evidently lightgbm scikit-learn

      - name: Run drift check
        run: python drift_check.py

      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: evidently_drift_report.html
